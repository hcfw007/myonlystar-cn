<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="一杯咖啡的时间搭好的博客">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdf6ec" />
      <stop offset="1" stop-color="#f0d8b8" />
    </linearGradient>
    <linearGradient id="steam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.0" />
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <g stroke="#3a2a1f" stroke-width="3" fill="none" opacity="0.85" stroke-linecap="round">
    <path d="M 520 140 C 540 110, 500 90, 520 60" />
    <path d="M 580 150 C 600 120, 560 100, 580 70" />
    <path d="M 640 140 C 660 110, 620 90, 640 60" />
  </g>

  <g transform="translate(420 180)">
    <path d="M 0 40 Q 0 0 40 0 L 280 0 Q 320 0 320 40 L 320 220 Q 320 280 260 280 L 60 280 Q 0 280 0 220 Z"
          fill="#ffffff" stroke="#2b1d14" stroke-width="6" />
    <path d="M 320 80 Q 400 80 400 140 Q 400 200 320 200"
          fill="none" stroke="#2b1d14" stroke-width="6" />

    <ellipse cx="160" cy="55" rx="135" ry="22" fill="#3a2418" />
    <ellipse cx="160" cy="55" rx="120" ry="14" fill="#6b4226" opacity="0.85" />
    <ellipse cx="120" cy="50" rx="22" ry="5" fill="#d9b48a" opacity="0.7" />
    <ellipse cx="190" cy="58" rx="14" ry="3.5" fill="#d9b48a" opacity="0.5" />
  </g>

  <text x="80" y="450" font-family="'Google Sans Code', ui-monospace, monospace"
        font-size="64" font-weight="700" fill="#2b1d14">
    Hello, AstroPaper
  </text>
  <text x="80" y="510" font-family="'Google Sans Code', ui-monospace, monospace"
        font-size="28" fill="#5a3a25">
    一杯咖啡的时间，把博客搭起来。
  </text>

  <g font-family="'Google Sans Code', ui-monospace, monospace" font-size="18" fill="#5a3a25">
    <text x="80" y="570">pnpm dev</text>
    <text x="220" y="570" opacity="0.6">→  http://localhost:4321</text>
  </g>
</svg>
